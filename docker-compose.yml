# Use root/example as user/password credentials

version: '3.8'

services:

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: example
    ports:
      - "3306:3306"
    volumes:
      - D:/Software-Projects/learning/spring-7-rest-mvc/mysql:/var/lib/mysql

volumes:
  mysql_data:
    # (this is just an example, not intended to be a production configuration)
